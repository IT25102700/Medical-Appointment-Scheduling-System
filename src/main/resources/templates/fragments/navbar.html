<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar">
    <a th:href="@{/}" class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        </div>
        <span class="logo-text">MediQueue</span>
    </a>
    <ul class="nav-links">
        <li><a th:href="@{/}" id="nav-home">HOME</a></li>
        <li><a th:href="@{/doctors}" id="nav-doctors">ALL DOCTORS</a></li>
        <li><a th:href="@{/about}" id="nav-about">ABOUT</a></li>
        <li><a th:href="@{/contact}" id="nav-contact">CONTACT</a></li>
    </ul>
    <div class="nav-actions">
        <button id="theme-toggle" class="btn btn-outline btn-sm" style="padding: 6px; border-radius: 50%; min-width: 32px; height: 32px; justify-content: center;">
            <svg id="sun-icon" style="width:16px;height:16px;display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg id="moon-icon" style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <div sec:authorize="isAnonymous()">
            <a th:href="@{/login}" class="btn btn-outline btn-sm" id="nav-login">Login</a>
            <a th:href="@{/register}" class="btn btn-primary btn-sm" id="nav-register">Create account</a>
        </div>
        <div sec:authorize="isAuthenticated()" style="display: flex; gap: 15px; align-items: center;">
            <a th:href="@{/notifications}" style="position: relative; color: var(--text); text-decoration: none;">
                <svg viewBox="0 0 24 24" style="width: 22px; height: 22px; fill: currentColor;"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                <span th:if="${unreadNotificationsCount > 0}" th:text="${unreadNotificationsCount}" 
                      style="position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border-radius: 50%; padding: 2px 5px; font-size: 0.6rem; font-weight: bold;">0</span>
            </a>
            <a th:href="@{/dashboard}" class="btn btn-outline btn-sm">My Dashboard</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
    </div>
    <script>
        const btn = document.getElementById('theme-toggle');
        const sun = document.getElementById('sun-icon');
        const moon = document.getElementById('moon-icon');
        const html = document.documentElement;
        
        if (localStorage.getItem('theme') === 'dark') {
            html.setAttribute('data-theme', 'dark');
            sun.style.display = 'block';
            moon.style.display = 'none';
        }

        btn.addEventListener('click', () => {
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                sun.style.display = 'none';
                moon.style.display = 'block';
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                sun.style.display = 'block';
                moon.style.display = 'none';
            }
        });
    </script>

</nav>
</body>
</html>
