<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Profile – MediQueue')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="auth-wrapper" style="align-items:flex-start;padding-top:40px;">
    <div class="auth-card" style="width:100%;max-width:900px;display:flex;gap:32px;text-align:left;">
        
        <div style="flex:0 0 240px;">
            <div style="width:240px;height:240px;background:#eee;border-radius:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
                <img th:if="${(patient != null and patient.profileImage != null) or (doctor != null and doctor.profileImage != null) or (admin != null and admin.profileImage != null)}" 
                     th:src="${patient != null ? patient.profileImage : (doctor != null ? doctor.profileImage : admin.profileImage)}" 
                     style="width:100%;height:100%;object-fit:cover;"/>
                <span th:unless="${(patient != null and patient.profileImage != null) or (doctor != null and doctor.profileImage != null) or (admin != null and admin.profileImage != null)}" style="font-size:5rem;">👤</span>
            </div>
            <p style="font-size:0.8rem;color:var(--secondary);text-align:center;">Profile Picture</p>
        </div>

        <div style="flex:1;">
            <h2 th:text="${patient != null ? patient.fullName : (doctor != null ? doctor.fullName : (admin != null ? admin.fullName : 'User Profile'))}">User Profile</h2>
            <hr style="margin:16px 0;border:0;border-top:1px solid var(--border);"/>
            
            <form th:action="${patient != null ? '/patient/profile/update' : (doctor != null ? '/doctor/profile/update' : '/admin/profile/update')}" method="post" enctype="multipart/form-data">
                <div class="stats-grid" style="grid-template-columns:1fr 1fr;gap:16px;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="fullName" th:value="${patient != null ? patient.fullName : (doctor != null ? doctor.fullName : (admin != null ? admin.fullName : ''))}" required/>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" th:value="${patient != null ? patient.email : (doctor != null ? doctor.email : (admin != null ? admin.email : ''))}" required/>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" name="phone" th:value="${patient != null ? patient.phone : (doctor != null ? doctor.phone : (admin != null ? admin.phone : ''))}"/>
                    </div>
                    <div class="form-group">
                        <label>Upload Profile Photo</label>
                        <input type="file" name="profileImageFile" accept="image/*"/>
                    </div>

                    <!-- Patient specific -->
                    <div th:if="${patient != null}" class="form-group">
                        <label>Blood Group</label>
                        <input type="text" name="bloodGroup" th:value="${patient.bloodGroup}"/>
                    </div>
                    <div th:if="${patient != null}" class="form-group">
                        <label>Allergies</label>
                        <input type="text" name="allergies" th:value="${patient.allergies}"/>
                    </div>

                    <!-- Doctor specific -->
                    <div th:if="${doctor != null}" class="form-group">
                        <label>Specialization</label>
                        <input type="text" name="specialization" th:value="${doctor.specialization}"/>
                    </div>
                    <div th:if="${doctor != null}" class="form-group">
                        <label>Degree</label>
                        <input type="text" name="degree" th:value="${doctor.degree}"/>
                    </div>
                    <div th:if="${doctor != null}" class="form-group">
                        <label>Experience</label>
                        <select name="experience">
                            <option value="1 Year" th:selected="${doctor.experience == '1 Year'}">1 Year</option>
                            <option value="2 Years" th:selected="${doctor.experience == '2 Years'}">2 Years</option>
                            <option value="3 Years" th:selected="${doctor.experience == '3 Years'}">3 Years</option>
                            <option value="4 Years" th:selected="${doctor.experience == '4 Years'}">4 Years</option>
                            <option value="5+ Years" th:selected="${doctor.experience == '5+ Years'}">5+ Years</option>
                            <option value="10+ Years" th:selected="${doctor.experience == '10+ Years'}">10+ Years</option>
                        </select>
                    </div>
                    <div th:if="${doctor != null}" class="form-group">
                        <label>Appointment Fee (Rs.)</label>
                        <input type="number" name="appointmentFee" th:value="${doctor.appointmentFee}"/>
                    </div>
                    <div th:if="${doctor != null}" class="form-group">
                        <label>License Number</label>
                        <input type="text" name="licenseNumber" th:value="${doctor.licenseNumber}"/>
                    </div>
                </div>

                <div th:if="${doctor != null}" class="form-group" style="margin-top:16px;">
                    <label>About Me</label>
                    <textarea name="about" th:text="${doctor.about}" style="min-height:100px;"></textarea>
                </div>

                <div th:if="${doctor != null}" class="form-group" style="margin-top:16px;">
                    <label>Available Time Slots (comma separated)</label>
                    <input type="text" name="availableSlots" th:value="${doctor.availableSlots}" placeholder="09:00 AM, 10:00 AM, 11:00 AM"/>
                </div>

                <div style="margin-top:24px;">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
