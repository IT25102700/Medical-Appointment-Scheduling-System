<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Profile – MediQueue')}"></head>
<body>
<div style="display:flex;min-height:100vh;">
    <!-- Render correct sidebar dynamically -->
    <th:block th:if="${patient != null}">
        <div th:replace="~{fragments/sidebar :: patient-sidebar}"></div>
    </th:block>
    <th:block th:if="${doctor != null}">
        <div th:replace="~{fragments/sidebar :: doctor-sidebar}"></div>
    </th:block>
    <th:block th:if="${patient == null and doctor == null}">
        <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>
    </th:block>

    <div style="flex:1;background:var(--bg);">
        <div class="panel-header">
            <div>
                <h1 style="font-family:'Outfit',sans-serif;font-weight:700;">My Profile</h1>
                <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:4px;">Manage your account credentials, contact information, and specific profile parameters.</p>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>

        <div class="panel-body" style="animation:fadeIn 0.3s ease-out;">
            <div class="table-card" style="display:flex;gap:32px;padding:32px;align-items:flex-start;">
                
                <div style="flex:0 0 240px; text-align:center;">
                    <div style="width:240px;height:240px;background:#f3f4f6;border-radius:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:16px;border:1px solid var(--border);">
                        <img th:if="${(patient != null and patient.profileImage != null and patient.profileImage != '') or (doctor != null and doctor.profileImage != null and doctor.profileImage != '')}" 
                             th:src="${patient != null ? patient.profileImage : doctor.profileImage}" 
                             style="width:100%;height:100%;object-fit:cover;"/>
                        <span th:unless="${(patient != null and patient.profileImage != null and patient.profileImage != '') or (doctor != null and doctor.profileImage != null and doctor.profileImage != '')}" style="font-size:6rem;user-select:none;">👤</span>
                    </div>
                    <p style="font-size:0.85rem;color:var(--text-secondary);font-weight:600;">Profile Picture</p>
                </div>

                <div style="flex:1;">
                    <h2 style="font-family:'Outfit',sans-serif;font-weight:700;" th:text="${patient != null ? patient.fullName : (doctor != null ? doctor.fullName : 'Admin Profile')}">User Profile</h2>
                    <p style="color:var(--text-secondary);font-size:0.9rem;" th:text="${patient != null ? 'Patient Account' : (doctor != null ? 'Doctor Account' : 'System Administrator')}">Role</p>
                    <hr style="margin:20px 0;border:0;border-top:1px solid var(--border);"/>
                    
                    <form th:action="${patient != null ? '/patient/profile/update' : (doctor != null ? '/doctor/profile/update' : '/admin/profile/update')}" method="post" enctype="multipart/form-data">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                            <div class="form-group">
                                <label style="font-weight:600;">Full Name</label>
                                <input type="text" name="fullName" th:value="${patient != null ? patient.fullName : (doctor != null ? doctor.fullName : '')}" required style="padding:10px;"/>
                            </div>
                            <div class="form-group">
                                <label style="font-weight:600;">Email Address</label>
                                <input type="email" name="email" th:value="${patient != null ? patient.email : (doctor != null ? doctor.email : '')}" required style="padding:10px;"/>
                            </div>
                            <div class="form-group">
                                <label style="font-weight:600;">Phone Number</label>
                                <input type="text" name="phone" th:value="${patient != null ? patient.phone : (doctor != null ? doctor.phone : '')}" style="padding:10px;"/>
                            </div>
                            <div class="form-group">
                                <label style="font-weight:600;">Upload New Photo</label>
                                <input type="file" name="profileImageFile" accept="image/*" style="padding:8px;"/>
                            </div>

                            <!-- Patient specific -->
                            <div th:if="${patient != null}" class="form-group">
                                <label style="font-weight:600;">Blood Group</label>
                                <input type="text" name="bloodGroup" th:value="${patient.bloodGroup}" style="padding:10px;"/>
                            </div>
                            <div th:if="${patient != null}" class="form-group">
                                <label style="font-weight:600;">Allergies</label>
                                <input type="text" name="allergies" th:value="${patient.allergies}" style="padding:10px;"/>
                            </div>

                            <!-- Doctor specific -->
                            <div th:if="${doctor != null}" class="form-group">
                                <label style="font-weight:600;">Specialization</label>
                                <input type="text" name="specialization" th:value="${doctor.specialization}" style="padding:10px;"/>
                            </div>
                            <div th:if="${doctor != null}" class="form-group">
                                <label style="font-weight:600;">Degree</label>
                                <input type="text" name="degree" th:value="${doctor.degree}" style="padding:10px;"/>
                            </div>
                            <div th:if="${doctor != null}" class="form-group">
                                <label style="font-weight:600;">Experience</label>
                                <select name="experience" style="padding:10px;border-radius:8px;border:1px solid var(--border);">
                                    <option value="1 Year" th:selected="${doctor.experience == '1 Year'}">1 Year</option>
                                    <option value="2 Years" th:selected="${doctor.experience == '2 Years'}">2 Years</option>
                                    <option value="3 Years" th:selected="${doctor.experience == '3 Years'}">3 Years</option>
                                    <option value="4 Years" th:selected="${doctor.experience == '4 Years'}">4 Years</option>
                                    <option value="5+ Years" th:selected="${doctor.experience == '5+ Years'}">5+ Years</option>
                                    <option value="10+ Years" th:selected="${doctor.experience == '10+ Years'}">10+ Years</option>
                                </select>
                            </div>
                            <div th:if="${doctor != null}" class="form-group">
                                <label style="font-weight:600;">Appointment Fee (Rs.)</label>
                                <input type="number" name="appointmentFee" th:value="${doctor.appointmentFee}" style="padding:10px;"/>
                            </div>
                            <div th:if="${doctor != null}" class="form-group">
                                <label style="font-weight:600;">License Number</label>
                                <input type="text" name="licenseNumber" th:value="${doctor.licenseNumber}" style="padding:10px;"/>
                            </div>
                        </div>

                        <div th:if="${doctor != null}" class="form-group" style="margin-top:20px;">
                            <label style="font-weight:600;">About Me</label>
                            <textarea name="about" th:text="${doctor.about}" style="min-height:100px;padding:12px;"></textarea>
                        </div>

                        <div th:if="${doctor != null}" class="form-group" style="margin-top:20px;">
                            <label style="font-weight:600;">Available Time Slots (comma separated)</label>
                            <input type="text" name="availableSlots" th:value="${doctor.availableSlots}" placeholder="09:00 AM, 10:00 AM, 11:00 AM" style="padding:10px;"/>
                        </div>

                        <div style="margin-top:28px;">
                            <button type="submit" class="btn btn-primary" style="padding:12px 30px;">Save Profile Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/panel.js}"></script>
</body>
</html>
