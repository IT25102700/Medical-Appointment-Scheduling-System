<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Help Desk Chat – MediQueue')}"></head>
<body>
<div style="display:flex;min-height:100vh;">
    <div th:replace="~{fragments/sidebar :: patient-sidebar}"></div>
    
    <div style="flex:1;display:flex;flex-direction:column;background:var(--bg);">
        <div class="panel-header" style="border-bottom:1px solid var(--border);">
            <div>
                <h1 style="font-family:'Outfit',sans-serif;font-weight:700;">Help Desk Chat</h1>
                <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:4px;">Direct access to our hospital front desk staff for any assistance regarding scheduling or booking support.</p>
            </div>
        </div>

        <div style="flex:1;display:flex;flex-direction:column;background:#f8fafc;overflow:hidden;">
            <!-- Active Chat Header -->
            <div style="background:white;padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;box-shadow:0 1px 2px rgba(0,0,0,0.03);">
                <div style="width:40px;height:40px;border-radius:50%;background:#fef3c7;color:#d97706;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;user-select:none;">
                    💁‍♀️
                </div>
                <div>
                    <h3 style="margin:0;font-size:1rem;font-weight:700;color:var(--text);font-family:'Outfit',sans-serif;">Front Desk Help Desk</h3>
                    <p style="margin:2px 0 0 0;font-size:0.75rem;color:var(--text-secondary);font-weight:500;">Live Assistance Channel</p>
                </div>
            </div>

            <!-- Chat Messages List -->
            <div id="chat-messages" style="flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;">
                <div th:each="msg : ${conversation}" 
                     style="display:flex;flex-direction:column;max-width:70%;"
                     th:styleappend="${msg.senderId == patient.userId} ? 'align-self:flex-end;align-items:flex-end;' : 'align-self:flex-start;align-items:flex-start;'">
                    
                    <div style="padding:12px 16px;border-radius:14px;font-size:0.9rem;line-height:1.4;box-shadow:0 1px 2px rgba(0,0,0,0.05);"
                         th:styleappend="${msg.senderId == patient.userId} ? 'background:var(--primary);color:white;border-bottom-right-radius:2px;' : 'background:white;color:var(--text);border-bottom-left-radius:2px;border:1px solid var(--border);'"
                         th:text="${msg.content}">
                        Message Content
                    </div>
                    <span style="font-size:0.7rem;color:var(--text-secondary);margin-top:4px;" 
                          th:text="${#temporals.format(msg.timestamp, 'dd MMM | HH:mm')}">12 May 14:30</span>
                </div>
                <div th:if="${#lists.isEmpty(conversation)}" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:0.85rem;font-style:italic;">
                    No messages exchanged yet. Send a message to initiate your help desk inquiry!
                </div>
            </div>

            <!-- Chat Input Field -->
            <div style="background:white;padding:16px 24px;border-top:1px solid var(--border);">
                <form th:action="@{/patient/helpdesk/send}" method="post" style="display:flex;gap:12px;align-items:center;">
                    <input type="text" name="content" placeholder="Type a message here..." required autocomplete="off"
                           style="flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-size:0.9rem;outline:none;transition:border-color 0.2s;"
                           onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'"/>
                    <button type="submit" class="btn btn-primary" style="padding:12px 24px;font-weight:600;font-size:0.9rem;border-radius:10px;">Send Inquiry</button>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    // Auto Scroll Chat to bottom
    const chatContainer = document.getElementById('chat-messages');
    if (chatContainer) {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
</script>
<script th:src="@{/js/panel.js}"></script>
</body>
</html>
