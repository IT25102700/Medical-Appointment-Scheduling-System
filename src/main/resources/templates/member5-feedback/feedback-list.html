<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Patient Feedbacks – Admin')}"></head>
<body>
<div style="display:flex;min-height:100vh;">
    <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>
    <div style="flex:1;background:var(--bg);">
        <div class="panel-header">
            <h1>Patient Feedbacks</h1>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
        <div class="panel-body">

            <div th:if="${message}" class="alert alert-success" style="color: var(--success); margin-bottom: 1rem;" th:text="${message}"></div>
            <div th:if="${error}" class="alert alert-danger" style="color: var(--danger); margin-bottom: 1rem;" th:text="${error}"></div>

            <div class="table-card">
                <h3>All Patient Feedbacks</h3>
                <table>
                    <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Rating</th>
                        <th>Comment</th>
                        <th style="text-align:right;">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="feedback : ${feedbacks}">
                        <td>
                            <span th:if="${feedback.doctorId == 'SYSTEM'}" th:text="${feedback.patientId}" style="font-weight:600;">General Review Submitter</span>
                            <div th:unless="${feedback.doctorId == 'SYSTEM'}">
                                <span th:each="u : ${users}" th:if="${u.userId == feedback.patientId}" th:text="${u.fullName}" style="font-weight:600;">Patient Name</span>
                                <span th:unless="${#lists.toList(users).?[userId == '__${feedback.patientId}__'].size() > 0}" th:text="${feedback.patientId}">Patient ID</span>
                            </div>
                        </td>
                        <td>
                            <span th:if="${feedback.doctorId == 'SYSTEM'}" style="font-weight:700; color:var(--primary);">System Platform Review</span>
                            <div th:unless="${feedback.doctorId == 'SYSTEM'}">
                                <span th:each="d : ${doctors}" th:if="${d.doctorId == feedback.doctorId}" th:text="'Dr. ' + ${d.fullName}" style="font-weight:600;">Doctor Name</span>
                                <span th:unless="${#lists.toList(doctors).?[doctorId == '__${feedback.doctorId}__'].size() > 0}" th:text="${feedback.doctorId}">Doctor ID</span>
                            </div>
                        </td>
                        <td>
                            <span th:text="${feedback.rating} + ' / 5'" style="font-weight:600;color:var(--warning);">5 / 5</span>
                        </td>
                        <td th:text="${feedback.comment}">Great service</td>
                        <td style="text-align:right;">
                            <form th:action="@{/admin/feedbacks/delete}" method="post" style="display:inline;">
                                <input type="hidden" name="feedbackId" th:value="${feedback.feedbackId}"/>
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this feedback?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(feedbacks)}">
                        <td colspan="5" style="text-align:center; padding:30px; color:var(--text-secondary);">No feedbacks recorded.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/panel.js}"></script>
</body>
</html>
