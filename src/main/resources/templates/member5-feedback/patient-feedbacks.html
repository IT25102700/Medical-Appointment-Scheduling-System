<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('My Feedbacks – MediQueue')}"></head>
<body>
<div style="display:flex;min-height:100vh;">
    <div th:replace="~{fragments/sidebar :: patient-sidebar}"></div>
    <div style="flex:1;background:var(--bg);">
        <div class="panel-header">
            <div>
                <h1 style="font-family:'Outfit',sans-serif;font-weight:700;">My Feedbacks</h1>
                <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:4px;">Manage and view all the experiences and ratings you submitted for consultation appointments.</p>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>

        <div class="panel-body" style="animation:fadeIn 0.3s ease-out;">
            <div th:if="${feedbacks == null or #lists.isEmpty(feedbacks)}" style="text-align: center; padding: 60px 20px; background: white; border-radius: 12px; border: 1px solid var(--border);">
                <p style="color: var(--text-secondary);">You have not submitted any feedbacks yet.</p>
                <a th:href="@{/patient/appointments}" class="btn btn-primary" style="margin-top: 1rem;">View Appointments</a>
            </div>

            <div th:if="${feedbacks != null and !#lists.isEmpty(feedbacks)}" class="table-card">
                <h3>My Submitted Feedbacks</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Doctor</th>
                            <th>Rating</th>
                            <th>Comment</th>
                            <th style="text-align:right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="feedback : ${feedbacks}">
                            <td style="font-weight: 600;">
                                <span th:each="d : ${doctors}" th:if="${d.doctorId == feedback.doctorId}" th:text="'Dr. ' + ${d.fullName}">Doctor Name</span>
                                <span th:unless="${#lists.toList(doctors).?[doctorId == '__${feedback.doctorId}__'].size() > 0}" th:text="${feedback.doctorId}">Doctor ID</span>
                            </td>
                            <td>
                                <span style="color:#d97706; font-weight:700; font-size:1.05rem;">★ <span th:text="${feedback.rating}">5</span> / 5</span>
                            </td>
                            <td th:text="${feedback.comment}">Great service</td>
                            <td style="text-align:right;">
                                <form th:action="@{/patient/feedbacks/delete}" method="post" style="display:inline;">
                                    <input type="hidden" name="feedbackId" th:value="${feedback.feedbackId}"/>
                                    <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this feedback?')">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/panel.js}"></script>
</body>
</html>
