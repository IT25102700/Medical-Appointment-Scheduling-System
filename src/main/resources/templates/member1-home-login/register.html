<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Create Account – MediQueue')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p>Please sign up to book appointment</p>

        <div th:if="${error}" class="alert alert-danger" style="color: var(--danger); margin-bottom: 1rem;" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Username" required/>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullName" placeholder="Full Name" required/>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Email Address" required/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="reg-pass" name="password" placeholder="Password" required/>
                    <span class="toggle-password" id="toggle-reg-pass" onclick="togglePassword('reg-pass', 'toggle-reg-pass')">🔒</span>
                </div>
            </div>

            <input type="hidden" name="role" value="ROLE_PATIENT"/>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">Create account</button>
        </form>
        <p class="auth-link">Already have an account? <a th:href="@{/login}">Login here</a></p>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
