<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Change Password – MediQueue')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Change Password</h2>
        <p>Update your account password securely</p>

        <!-- Alert messages -->
        <div th:if="${error}" class="alert alert-danger" style="color: var(--danger); margin-bottom: 1rem;" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" style="color: var(--success); margin-bottom: 1rem;" th:text="${message}"></div>

        <form th:action="@{/change-password}" method="post">
            <div class="form-group">
                <label>Current Password</label>
                <div class="password-wrapper">
                    <input type="password" id="curr-pass" name="currentPassword" placeholder="Current Password" required/>
                    <span class="toggle-password" id="toggle-curr-pass" onclick="togglePassword('curr-pass', 'toggle-curr-pass')">🔒</span>
                </div>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="new-pass" name="newPassword" placeholder="New Password" required/>
                    <span class="toggle-password" id="toggle-new-pass" onclick="togglePassword('new-pass', 'toggle-new-pass')">🔒</span>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="conf-pass" name="confirmPassword" placeholder="Confirm New Password" required/>
                    <span class="toggle-password" id="toggle-conf-pass" onclick="togglePassword('conf-pass', 'toggle-conf-pass')">🔒</span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">Change Password</button>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
